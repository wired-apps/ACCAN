<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expand</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 30px;
        height: 30px;
        overflow: hidden;        /* ✅ removes scrollbar */
        background: none;
    }
    body {
        display: flex;
        align-items: center;
        justify-content: center;
    }
    button {
        border: none;
        width: 30px;
        height: 30px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(99,102,241,0.4);
        transition: transform 0.2s, box-shadow 0.2s;
        flex-shrink: 0;          /* ✅ prevents button from shrinking */
    }
    button:hover {
        transform: scale(1.1);
    }
    button svg {
        width: 18px;             /* ✅ slightly smaller so it fits cleanly */
        height: 18px;
        fill: grey;
    }
</style>
</head>
<body>
<button id="myButton" title="Expand Dashboard">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3h7v2H5v5H3V3zm11 0h7v7h-2V5h-5V3zM3 14h2v5h5v2H3v-7zm16 5h-5v2h7v-7h-2v5z"/>
    </svg>
</button>
<script>
    let paramName = window.location.search;
    const dashboardURL = paramName.split('=')[1];

    function sendMessage() {
        const endingURL = ':showVizHome=no&toolbar=no';
        const data = {
            action: 'openModal',
            url: 'https://public.tableau.com/views/' + dashboardURL + '?' + endingURL
        };
        window.parent.postMessage(data, '*');
        window.parent.parent.postMessage(data, '*');
        window.parent.parent.parent.postMessage(data, '*');
    }

    document.getElementById("myButton").addEventListener("click", function () {
        sendMessage();
    });
</script>
</body>
</html>
