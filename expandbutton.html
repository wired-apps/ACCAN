<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expand</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        /*width: 30px;
        height: 30px;*/
        overflow: hidden;        /* ✅ removes scrollbar */
        background: transparent;
		border: transparent;
    }
    body {
        display: flex;
        align-items: center;
        justify-content: center;
		background: transparent;
		border: transparent;
    }
    button {
		background: transparent;
        border: transparent;
        width: 30px;
        height: 30px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        /*box-shadow: 0 4px 20px rgba(99,102,241,0.4);*/
        transition: transform 0.2s, box-shadow 0.2s;
        flex-shrink: 0;          /* ✅ prevents button from shrinking */
    }
    button:hover {
        transform: scale(1.1);
    }
    button svg {
        width: 100%;
    	height: 100%;
        fill: #F97132;
    }
</style>
</head>
<body>
<button id="myButton" title="Expand Dashboard">
   <svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg" width="30" height="30">
  <path d="M3.75 5h8.75v2.5H6.25v6.25H3.75V5zm13.75 0h8.75v8.75h-2.5V7.5h-6.25V5zM3.75 16.25h2.5v6.25h6.25V25H3.75v-8.75zm20 6.25h-6.25V25h8.75v-8.75h-2.5v6.25z"/>
</svg>
</button>
<script>
    let paramName = window.location.search;
    const dashboardURL = paramName.split('=')[1];

    function sendMessage() {
        const endingURL = ':showVizHome=no&toolbar=no';
        const data = {
            action: 'openModal',
            url: 'https://public.tableau.com/views/' + dashboardURL + '?' + endingURL
        };
        window.parent.postMessage(data, '*');
        window.parent.parent.postMessage(data, '*');
        window.parent.parent.parent.postMessage(data, '*');
    }

    document.getElementById("myButton").addEventListener("click", function () {
        sendMessage();
    });
</script>
</body>
</html>
